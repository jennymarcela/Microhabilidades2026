<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microhabilidades 2026 · 2do Grado</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:    #3b82f6; --blue-d: #1d4ed8; --blue-l: #dbeafe;
      --green:   #10b981; --green-l: #d1fae5;
      --orange:  #f59e0b; --orange-l: #fef3c7;
      --red:     #ef4444; --red-l: #fee2e2;
      --purple:  #8b5cf6; --purple-l: #ede9fe;
      --pink:    #ec4899; --pink-l: #fce7f3;
      --teal:    #14b8a6; --teal-l: #ccfbf1;
      --bg:      #f0f9ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; }

    /* ── HEADER ───────────────────────────── */
    header {
      background: white;
      box-shadow: 0 2px 12px rgba(59,130,246,.12);
      padding: 12px 20px;
      position: sticky; top: 0; z-index: 50;
    }
    .header-inner { max-width: 1280px; margin: auto; display: flex; flex-direction: column; gap: 10px; }
    .header-top { display: flex; align-items: center; gap: 12px; }
    .logo { background: var(--blue); color: white; border-radius: 14px; padding: 8px 12px; font-size: 22px; line-height: 1; }
    .logo-text h1 { font-size: 17px; font-weight: 900; color: #1e293b; }
    .logo-text p  { font-size: 11px; font-weight: 700; color: var(--blue); letter-spacing: .06em; text-transform: uppercase; }
    .score-pill {
      margin-left: auto;
      background: var(--orange-l);
      border: 2px solid var(--orange);
      color: #92400e;
      font-weight: 800;
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 999px;
    }

    /* Week nav */
    .week-nav { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
    .week-nav::-webkit-scrollbar { display: none; }
    .week-btn {
      padding: 5px 14px; border-radius: 999px; border: 2px solid #e2e8f0;
      background: white; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12px;
      color: #64748b; cursor: pointer; white-space: nowrap; transition: all .18s;
    }
    .week-btn:hover  { border-color: var(--blue); color: var(--blue); }
    .week-btn.active { background: var(--blue); border-color: var(--blue); color: white; }

    /* ── LAYOUT ───────────────────────────── */
    .app { max-width: 1280px; margin: 20px auto; padding: 0 16px 40px; display: grid; grid-template-columns: 200px 1fr; gap: 20px; }
    @media(max-width:768px){ .app { grid-template-columns: 1fr; } }

    /* ── SIDEBAR ──────────────────────────── */
    .sidebar { background: white; border-radius: 20px; padding: 14px 10px; border: 1px solid #e0effe; height: fit-content; position: sticky; top: 100px; }
    .sidebar-title { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; padding: 0 6px; }
    .sub-btn {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 9px 10px; border-radius: 14px; border: none; background: transparent;
      cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px;
      color: #475569; transition: all .18s; text-align: left; margin-bottom: 3px;
    }
    .sub-btn:hover  { background: #f1f5f9; }
    .sub-btn.active { background: var(--blue-l); color: var(--blue-d); box-shadow: 0 0 0 1.5px var(--blue); }
    .sub-btn .ico   { font-size: 18px; width: 26px; text-align: center; }

    /* ── MAIN CONTENT ─────────────────────── */
    .content {}
    .content-header { margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; justify-content: space-between; }
    .content-header h2 { font-size: 26px; font-weight: 900; color: #1e293b; }
    .content-header p  { font-size: 14px; color: #64748b; font-weight: 600; margin-top: 2px; }

    /* ── EXERCISE GRID ────────────────────── */
    .ex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:640px){ .ex-grid { grid-template-columns: 1fr; } }

    /* ── CARD ─────────────────────────────── */
    .card {
      background: white; border-radius: 22px; padding: 20px;
      border: 2.5px solid #e0effe; display: flex; flex-direction: column; gap: 14px;
      transition: transform .2s, box-shadow .2s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(59,130,246,.13); }
    .card.correct { border-color: var(--green) !important; background: var(--green-l) !important; }
    .card.incorrect-flash { border-color: var(--red); animation: shake .3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .micro-badge {
      font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: .06em; white-space: nowrap;
    }
    .speak-btn {
      background: var(--blue-l); border: none; border-radius: 999px;
      padding: 7px; cursor: pointer; color: var(--blue); flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    .speak-btn:hover  { background: var(--blue); color: white; }
    .speak-btn:active { transform: scale(.88); }
    .instruccion { font-size: 14px; font-weight: 700; color: #1e293b; line-height: 1.45; }

    /* Opciones multiple choice */
    .opts { display: flex; flex-direction: column; gap: 7px; }
    .opt-btn {
      width: 100%; text-align: left; padding: 9px 14px; border-radius: 12px;
      border: 2px solid #e2e8f0; background: #f8fafc; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; color: #334155;
      transition: all .15s;
    }
    .opt-btn:hover         { border-color: var(--blue); background: var(--blue-l); color: var(--blue-d); }
    .opt-btn.opt-correct   { border-color: var(--green); background: var(--green-l); color: #065f46; }
    .opt-btn.opt-incorrect { border-color: var(--red);   background: var(--red-l);   color: #991b1b; }

    /* True/False */
    .tf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tf-btn {
      padding: 10px 6px; border-radius: 14px; border: 2px solid; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px; transition: all .15s;
    }
    .tf-true  { border-color: #a7f3d0; background: #f0fdf4; color: #065f46; }
    .tf-false { border-color: #fca5a5; background: #fff5f5; color: #991b1b; }
    .tf-true:hover  { background: var(--green); color: white; border-color: var(--green); }
    .tf-false:hover { background: var(--red);   color: white; border-color: var(--red); }

    /* Fill blank */
    .fill-row { display: flex; gap: 8px; }
    .fill-input {
      flex: 1; padding: 9px 12px; border-radius: 12px; border: 2px solid #e2e8f0;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    .fill-input:focus { border-color: var(--blue); }
    .fill-input.wrong { border-color: var(--red); animation: shake .3s; }
    .ok-btn {
      background: var(--blue); color: white; border: none; border-radius: 12px;
      padding: 9px 16px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px;
      cursor: pointer; transition: background .15s;
    }
    .ok-btn:hover { background: var(--blue-d); }

    /* Drag & drop */
    .pieces { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 4px; }
    .piece {
      background: #fff7ed; color: #c2410c; border: 2px solid #fed7aa;
      border-radius: 12px; padding: 6px 12px; cursor: grab;
      font-weight: 800; font-size: 12px; user-select: none; transition: all .15s;
    }
    .piece:hover { background: var(--orange); color: white; border-color: var(--orange); }
    .piece.used  { opacity: .35; cursor: default; }
    .dropzone {
      min-height: 48px; border: 2.5px dashed #cbd5e1; border-radius: 14px;
      background: #f8fafc; display: flex; flex-wrap: wrap; gap: 6px;
      align-items: center; padding: 8px; transition: all .15s;
    }
    .dropzone.dragover { border-color: var(--blue); background: var(--blue-l); }
    .dropzone-hint { color: #94a3b8; font-size: 11px; font-weight: 700; pointer-events: none; }
    .placed {
      background: var(--blue); color: white; border-radius: 999px;
      padding: 4px 12px; font-size: 11px; font-weight: 800;
    }

    /* ── LOADING ──────────────────────────── */
    .loading-card {
      background: white; border-radius: 22px; padding: 28px 20px;
      border: 2.5px solid #e0effe; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; min-height: 180px;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid var(--blue-l);
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-weight: 800; color: var(--blue); font-size: 14px; text-align: center; }

    /* ── ERROR ────────────────────────────── */
    .error-card {
      background: var(--red-l); border-radius: 22px; padding: 24px 20px;
      border: 2px solid var(--red); color: #7f1d1d; font-weight: 700; font-size: 13px;
    }

    /* ── MODAL ────────────────────────────── */
    #modal {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px;
    }
    #modal.show { display: flex; }
    .modal-box {
      background: white; border-radius: 28px; padding: 36px 28px;
      max-width: 360px; width: 100%; text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,.2); animation: popIn .25s ease;
    }
    @keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
    .modal-icon { font-size: 64px; margin-bottom: 12px; animation: bounce 1s infinite alternate; }
    @keyframes bounce { to { transform: translateY(-8px); } }
    .modal-title { font-size: 24px; font-weight: 900; color: var(--blue-d); margin-bottom: 6px; }
    .modal-msg   { font-size: 14px; color: #475569; font-weight: 600; margin-bottom: 20px; }
    .modal-close {
      width: 100%; background: var(--blue); color: white;
      border: none; border-radius: 14px; padding: 13px;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
      cursor: pointer; transition: background .15s;
    }
    .modal-close:hover { background: var(--blue-d); }

    /* Correct checkmark overlay on card */
    .check-overlay { font-size: 32px; text-align: center; font-weight: 900; color: var(--green); }
  </style>
</head>

// ═══════════════════════════════════════════════════════
// TTS  (rate 0.9 – clara y pausada para niños)
// ═══════════════════════════════════════════════════════
function speak(text, lang = 'es-ES') {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang  = lang;
  u.rate  = 0.9;
  u.pitch = 1.05;
  u.volume= 1.0;
  // Prefer a kid-friendly voice if available
  const voices = window.speechSynthesis.getVoices();
  const match = voices.find(v => v.lang.startsWith(lang.split('-')[0]) && !v.name.toLowerCase().includes('compact'));
  if (match) u.voice = match;
  window.speechSynthesis.speak(u);
}
// Preload voices
window.speechSynthesis.onvoiceschanged = () => {};

async function generateExercises(materia, week) {
  const key = `${materia}-${week}`;
  const exercises = EXERCISES[key];
  if (!exercises) {
    // Fallback genérico si falta alguna combinación
    return [
      {tipo:'multiple-choice', micro:'Repaso', instruccion:`Semana ${week}: ¿Cuál es la respuesta correcta?`, opciones:['Opción A','Opción B','Opción C'], correcta:'Opción A', audioTexto:'Repaso'},
      {tipo:'fill-blank', micro:'Repaso', instruccion:'Completa con la palabra correcta: "Aprender es ___"', correcta:'importante', audioTexto:'importante'},
      {tipo:'true-false', micro:'Repaso', instruccion:'¿Estudiar y practicar ayuda a aprender mejor?', correcta:true, audioTexto:'estudiar y practicar'},
      {tipo:'drag-drop', micro:'Repaso', instruccion:'Ordena los pasos del aprendizaje:', piezas:['Practicar','Aprender','Mejorar'], correcta:['Aprender','Practicar','Mejorar'], audioTexto:'aprender, practicar, mejorar'}
    ];
  }
  return exercises;
}

// ═══════════════════════════════════════════════════════
// RENDER EXERCISES
// ═══════════════════════════════════════════════════════
async function renderExercises() {
  const grid = document.getElementById('ex-grid');
  const mat  = MATERIAS.find(m => m.id === S.materia);

  // Show loading cards (6 for soc weeks 6-9, else 4)
  const previewCount = (S.materia === 'soc' && S.week >= 6) ? 6 : 4;
  grid.innerHTML = Array(previewCount).fill(0).map(() => `
    <div class="loading-card">
      <div class="spinner"></div>
      <div class="loading-text">⚡ Cargando misión...</div>
    </div>
  `).join('');

  let exercises;
  try {
    exercises = await generateExercises(S.materia, S.week);
  } catch(e) {
    grid.innerHTML = `<div class="error-card" style="grid-column:1/-1">
      ⚠️ No se pudo cargar este ejercicio. Intenta recargar la página.<br>
      <small>${e.message}</small>
    </div>`;
    return;
  }

  grid.innerHTML = '';
  exercises.forEach((ex, i) => {
    const cardId = `card-${S.week}-${S.materia}-${i}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.id = cardId;

    card.innerHTML = `
      <div class="card-top">
        <span class="micro-badge" style="background:${mat.badge};color:${mat.badgeText}">${ex.micro}</span>
        <button class="speak-btn" onclick="speak('${(ex.audioTexto||'').replace(/'/g,"\\'")}','${mat.lang}')" title="Escuchar">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>
          </svg>
        </button>
      </div>
      <p class="instruccion">${ex.instruccion}</p>
      <div class="action-zone" id="az-${cardId}">
        ${buildActionZone(ex, cardId)}
      </div>
    `;

    // Store ex data on card for drag-drop state
    card._ex = ex;
    card._dropped = [];
    grid.appendChild(card);
  });
}

function buildActionZone(ex, cardId) {
  if (ex.tipo === 'multiple-choice') {
    return `<div class="opts">${ex.opciones.map(opt =>
      `<button class="opt-btn" onclick="checkMC('${cardId}','${esc(opt)}','${esc(ex.correcta)}')">${opt}</button>`
    ).join('')}</div>`;
  }
  if (ex.tipo === 'fill-blank') {
    return `<div class="fill-row">
      <input id="inp-${cardId}" type="text" class="fill-input" placeholder="Escribe aquí..." autocomplete="off" autocorrect="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')checkFill('${cardId}','${esc(ex.correcta)}')" />
      <button class="ok-btn" onclick="checkFill('${cardId}','${esc(ex.correcta)}')">OK ✓</button>
    </div>`;
  }
  if (ex.tipo === 'true-false') {
    return `<div class="tf-row">
      <button class="tf-btn tf-true"  onclick="checkTF('${cardId}',true,${ex.correcta})">✅ Verdadero</button>
      <button class="tf-btn tf-false" onclick="checkTF('${cardId}',false,${ex.correcta})">❌ Falso</button>
    </div>`;
  }
  if (ex.tipo === 'drag-drop') {
    const piezasHTML = (ex.piezas||[]).map(p =>
      `<div class="piece" draggable="true" data-val="${esc(p)}"
        ondragstart="dStart(event)"
        onclick="dClick(event,'${cardId}')">
        ${p}
      </div>`
    ).join('');
    const correctaJSON = JSON.stringify(ex.correcta||[]).replace(/"/g,'&quot;');
    return `
      <div class="pieces" id="pieces-${cardId}">${piezasHTML}</div>
      <div class="dropzone" id="drop-${cardId}"
        ondragover="event.preventDefault();this.classList.add('dragover')"
        ondragleave="this.classList.remove('dragover')"
        ondrop="dDrop(event,'${cardId}',${correctaJSON})">
        <span class="dropzone-hint">👆 Arrastra las piezas aquí</span>
      </div>
    `;
  }
  return '';
}

function esc(str) {
  return String(str||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
}

// ═══════════════════════════════════════════════════════
// VALIDATORS
// ═══════════════════════════════════════════════════════
function checkMC(cardId, val, correct) {
  const card = document.getElementById(cardId);
  if (card.classList.contains('correct')) return;

  const isOk = val.toLowerCase().trim() === correct.toLowerCase().trim();
  const btns = card.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);

  if (isOk) {
    btns.forEach(b => { if (b.textContent.trim().toLowerCase() === correct.toLowerCase().trim()) b.classList.add('opt-correct'); });
    markCorrect(card);
  } else {
    const clicked = [...btns].find(b => b.textContent.trim().toLowerCase() === val.toLowerCase().trim());
    if (clicked) clicked.classList.add('opt-incorrect');
    setTimeout(() => { btns.forEach(b => { b.classList.remove('opt-incorrect'); b.disabled = false; }); }, 900);
  }
}

function checkFill(cardId, correct) {
  const card  = document.getElementById(cardId);
  if (card.classList.contains('correct')) return;
  const inp   = document.getElementById(`inp-${cardId}`);
  const val   = (inp.value||'').trim().toLowerCase();
  const okVal = correct.toLowerCase().trim();

  if (val === okVal || val.includes(okVal) || okVal.includes(val) && val.length > 1) {
    markCorrect(card);
  } else {
    inp.classList.add('wrong');
    setTimeout(() => { inp.classList.remove('wrong'); inp.value = ''; inp.focus(); }, 800);
  }
}

function checkTF(cardId, val, correct) {
  const card = document.getElementById(cardId);
  if (card.classList.contains('correct')) return;
  if (val === correct) {
    markCorrect(card);
  } else {
    card.classList.add('incorrect-flash');
    setTimeout(() => card.classList.remove('incorrect-flash'), 400);
    const mat = MATERIAS.find(m => m.id === S.materia);
    speak(mat.lang === 'en-US' ? 'Try again!' : '¡Inténtalo de nuevo!', mat.lang);
  }
}

// Drag & drop
let _dragVal = null;
function dStart(ev) { _dragVal = ev.target.dataset.val; }

function dClick(ev, cardId) {
  // Mobile fallback: tap piece → move to dropzone
  const val = ev.currentTarget.dataset.val;
  const fakeEv = { preventDefault:()=>{} };
  const zone = document.getElementById(`drop-${cardId}`);
  const card = document.getElementById(cardId);
  const correctArr = card._ex?.correcta || [];
  _dragVal = val;
  zone.dispatchEvent(Object.assign(new Event('drop'), { preventDefault:()=>{}, dataTransfer:{ getData: ()=>val } }));
}

function dDrop(ev, cardId, correctArr) {
  ev.preventDefault();
  const zone = document.getElementById(`drop-${cardId}`);
  zone.classList.remove('dragover');
  const card = document.getElementById(cardId);
  if (card.classList.contains('correct')) return;

  const val  = ev.dataTransfer?.getData('text') || _dragVal;
  if (!val) return;

  // Mark piece as used
  const pieces = document.querySelectorAll(`#pieces-${cardId} .piece`);
  pieces.forEach(p => { if (p.dataset.val === val && !p.classList.contains('used')) { p.classList.add('used'); } });

  // Remove hint
  const hint = zone.querySelector('.dropzone-hint');
  if (hint) hint.remove();

  const placed = document.createElement('span');
  placed.className = 'placed';
  placed.textContent = val;
  zone.appendChild(placed);

  card._dropped = card._dropped || [];
  card._dropped.push(val);

  if (card._dropped.length === correctArr.length) {
    const ok = JSON.stringify(card._dropped) === JSON.stringify(correctArr);
    if (ok) {
      markCorrect(card);
    } else {
      zone.innerHTML = '<span class="dropzone-hint">👆 Arrastra las piezas aquí</span>';
      card._dropped = [];
      pieces.forEach(p => p.classList.remove('used'));
      card.classList.add('incorrect-flash');
      setTimeout(() => card.classList.remove('incorrect-flash'), 400);
      const mat = MATERIAS.find(m => m.id === S.materia);
      speak(mat.lang === 'en-US' ? 'Try again! Check the order.' : '¡Revisa el orden e inténtalo de nuevo!', mat.lang);
    }
  }
}

// ═══════════════════════════════════════════════════════
// SUCCESS
// ═══════════════════════════════════════════════════════
function markCorrect(card) {
  card.classList.add('correct');
  // Disable all interactive elements
  card.querySelectorAll('button,input').forEach(el => el.disabled = true);
  card.querySelectorAll('.piece').forEach(p => p.setAttribute('draggable','false'));

  // Add check
  const az = card.querySelector('.action-zone');
  if (az) { az.innerHTML = '<div class="check-overlay">🎉 ¡Correcto!</div>'; }

  S.score += 10;
  S.done  += 1;
  S.weekData[S.week].pts  += 10;
  S.weekData[S.week].done += 1;
  document.getElementById('score-display').textContent = S.score;
  document.getElementById('done-display').textContent  = S.done;
  updateWeekBadge(S.week);
  saveProgress();

  const msgs = ['¡Increíble! 🌟','¡Lo lograste! 🏆','¡Fantástico! 🦄','¡Eres un genio! 🧠','¡Bravo! 🎊','¡Perfecto! ⭐'];
  const icons = ['🌟','🏆','🦄','🎉','🧠','🚀','⭐'];
  const msg  = msgs[Math.floor(Math.random()*msgs.length)];
  const ico  = icons[Math.floor(Math.random()*icons.length)];

  document.getElementById('m-icon').textContent  = ico;
  document.getElementById('m-title').textContent = msg;
  document.getElementById('m-msg').textContent   = '¡Has completado esta misión correctamente!';

  const mat = MATERIAS.find(m => m.id === S.materia);
  speak(msg, 'es-ES');

  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

// ═══════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════
function initNav() {
  // Week buttons
  const wn = document.getElementById('week-nav');
  for (let i = 1; i <= 9; i++) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:3px;';
    const b = document.createElement('button');
    b.className = `week-btn${S.week===i?' active':''}`;
    b.textContent = `Semana ${i}`;
    b.onclick = () => { S.week = i; updateUI(); };
    const badge = document.createElement('span');
    badge.id = `wbadge-${i}`;
    badge.style.cssText = 'font-size:10px;font-weight:800;color:#64748b;white-space:nowrap;min-height:14px;';
    badge.textContent = '';
    wrap.appendChild(b);
    wrap.appendChild(badge);
    wn.appendChild(wrap);
  }

  // Subject buttons
  const sn = document.getElementById('subject-nav');
  MATERIAS.forEach(m => {
    const b = document.createElement('button');
    b.className = `sub-btn${S.materia===m.id?' active':''}`;
    b.innerHTML = `<span class="ico">${m.ico}</span><span>${m.nombre}</span>`;
    b.onclick = () => { S.materia = m.id; updateUI(); };
    sn.appendChild(b);
  });
}

function updateUI() {
  // Week buttons
  document.querySelectorAll('.week-btn').forEach((b,i) => {
    b.classList.toggle('active', S.week === i+1);
  });
  // Subject buttons
  document.querySelectorAll('.sub-btn').forEach((b,i) => {
    b.classList.toggle('active', S.materia === MATERIAS[i].id);
  });

  const mat = MATERIAS.find(m => m.id === S.materia);
  document.getElementById('main-title').textContent = `${mat.ico} ${mat.nombre}`;
  document.getElementById('main-sub').textContent   = `Semana ${S.week} · 4 Misiones`;

  renderExercises();
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
// STUDENT PROFILE — localStorage per name
// ═══════════════════════════════════════════════════════
function lsKey(name) { return `mh2026_${name.trim().toLowerCase().replace(/\s+/g,'_')}`; }

function saveProgress() {
  if (!S.studentName) return;
  const data = { score: S.score, done: S.done, weekData: S.weekData };
  localStorage.setItem(lsKey(S.studentName), JSON.stringify(data));
}

function loadProgress(name) {
  const raw = localStorage.getItem(lsKey(name));
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    S.score    = data.score    || 0;
    S.done     = data.done     || 0;
    S.weekData = data.weekData || S.weekData;
    document.getElementById('score-display').textContent = S.score;
    document.getElementById('done-display').textContent  = S.done;
    for (let w = 1; w <= 9; w++) updateWeekBadge(w);
  } catch(e) {}
}

function updateWeekBadge(w) {
  const el = document.getElementById(`wbadge-${w}`);
  if (!el) return;
  const d = S.weekData[w];
  if (d.pts > 0) {
    el.textContent = `⭐ ${d.pts} pts · ${d.done} ✓`;
    el.style.color = '#1d4ed8';
  } else {
    el.textContent = '';
  }
}

    <div id="nm-box">

  const inp = document.getElementById('nm-input');
  inp.focus();
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') startSession(); });
}

function startSession() {
  const inp = document.getElementById('nm-input');
  const name = (inp.value || '').trim();
  if (!name) { inp.style.borderColor='#ef4444'; inp.focus(); return; }
  S.studentName = name;
  // Update greeting in header
  const p = document.querySelector('.logo-text p');
  if (p) p.textContent = `Hola, ${name} · I Trimestre 2026`;
  document.getElementById('nm-overlay').remove();
  loadProgress(name);
}

function loadProfile(name) {
  document.getElementById('nm-input').value = name;
  startSession();
}

window.onload = () => {
  initNav();
  updateUI();
  showNameModal();
};
</script>
